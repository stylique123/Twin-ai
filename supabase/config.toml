project_id = "twinai"

[functions.generate-blueprint]
verify_jwt = true

[functions.start-dna]
verify_jwt = true

[functions.dna-poll]
verify_jwt = true

[functions.ingest-reference]
verify_jwt = true

[functions.enqueue-autoedit]
verify_jwt = true

[functions.admin]
verify_jwt = true

[functions.billing]
verify_jwt = true

# Payment-provider webhook: callable by the processor (which sends no Supabase
# JWT), so JWT verification MUST be off. The function does its own HMAC signature
# verification. Without this entry it defaults to verify_jwt=true and every real
# webhook is rejected with 401.
[functions.billing-webhook]
verify_jwt = false
