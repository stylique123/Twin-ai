project_id = "twinai"

[functions.generate-blueprint]
verify_jwt = true

[functions.start-dna]
verify_jwt = true

[functions.dna-poll]
verify_jwt = true

[functions.ingest-reference]
verify_jwt = true

[functions.enqueue-autoedit]
verify_jwt = true

[functions.admin]
verify_jwt = true

[functions.billing]
verify_jwt = true

# Payment-provider webhook: callable by the processor (which sends no Supabase
# JWT), so JWT verification MUST be off. The function does its own HMAC signature
# verification. Without this entry it defaults to verify_jwt=true and every real
# webhook is rejected with 401.
[functions.billing-webhook]
verify_jwt = false

# Social posting: the OAuth callback is hit by the browser redirect with no
# Supabase JWT, so verification MUST be off. start/publish/disconnect authenticate
# manually from the Authorization header; the callback authenticates from a signed
# `state`. Without this it defaults to verify_jwt=true and the OAuth round-trip 401s.
[functions.social]
verify_jwt = false

# Client approval: the client opens /review/:token with no Supabase JWT. The
# unguessable review_token is the access control; without this it would 401.
[functions.review]
verify_jwt = false

# Explicit for auditability — these default to verify_jwt = true anyway, and each
# also checks getUser() internally. Declared so the gateway posture is visible.
[functions.admin-metrics]
verify_jwt = true

[functions.brand-logo]
verify_jwt = true

[functions.referral]
verify_jwt = true

[functions.generate-thumbnail]
verify_jwt = true
