# Controlled PRODUCTION smoke of the Phase-1 source chain — required after any
# change to validate_source (Phase 4 changed how ready-state metadata is
# written). Runs the REAL flow as a signed-in probe user:
#   create source asset → signed upload → finalize → validate_source (VPS
#   worker) → ready → generation pointer linked
# then proves the database-level metadata merge preserved EVERYTHING.
#
# SAFETY ENVELOPE (this workflow touches production):
#   * workflow_dispatch ONLY — no push/PR/schedule/repository_dispatch
#   * refuses to run from any ref except main (no arbitrary-ref execution)
#   * probe CREDENTIALS are PROTECTED PRODUCTION-ENVIRONMENT SECRETS
#     (PROD_PROBE_EMAIL / PROD_PROBE_PASSWORD), never workflow-dispatch inputs.
#     The only caller-supplied input is a pre-created generation uuid, which is
#     validated and passed to the shell ONLY through `env:` — nothing
#     caller-provided is interpolated into a shell command or a JSON body.
#     Credentials are read by jq FROM THE ENVIRONMENT (`env.PROBE_*`), never as
#     `jq --arg` (which would place them in world-readable argv). Non-secret
#     JSON bodies (generation_id, attempt id, size) use `jq --arg`.
#   * least privilege: uses ONLY the public anon key from the committed web
#     env + the probe user's own session; no service keys — it CANNOT read
#     service keys, set EDITOR_V2_START_ENABLED, apply migrations, or deploy.
#   * access token and signed upload URL are masked before first use; error
#     paths print redacted bodies only
#   * probe identity uses the fixed gate-probe-* prefix. This job DOES create
#     durable production rows: a public.media_assets row, a
#     generations.source_asset_id pointer, a Storage object, and service-side
#     validate_source job/event state. It is NOT self-cleaning: the `takes`
#     bucket has NO DELETE policy (proven by check_takes_delete_policy.mjs), so
#     the probe user cannot delete its own object. The final step OBSERVES every
#     artifact (never claiming a deletion it did not observe) and FAILS CLOSED
#     with a recoverable-artifact report — the probe user/generation must then be
#     removed via the sanctioned operator retention cleanup. Do not run this
#     workflow without that plan.
#
# REQUIRED production-environment secrets (repo Settings → Environments →
# production): PROD_PROBE_EMAIL, PROD_PROBE_PASSWORD (a throwaway
# gate-probe-*@twinai.internal user). The smoke fails closed if absent.
name: Production source-validation smoke
on:
  workflow_dispatch:
    inputs:
      generation_id:
        description: 'Pre-created probe generation id (uuid, owned by the probe user)'
        required: true

# Kill switch / no overlap: one production smoke at a time. Attach
# required-reviewer protection to the `production` environment in repo settings
# so each run needs human approval before it can create anything.
concurrency:
  group: prod-source-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      # Caller-supplied uuid + protected secrets reach the shell ONLY here.
      GEN_ID: ${{ inputs.generation_id }}
      PROBE_EMAIL: ${{ secrets.PROD_PROBE_EMAIL }}
      PROBE_PASSWORD: ${{ secrets.PROD_PROBE_PASSWORD }}
    steps:
      - name: Refuse non-main refs
        run: |
          [ "$GITHUB_REF_NAME" = "main" ] || { echo "::error::runs only from main"; exit 1; }

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20 }   # residue_flow.mjs uses global fetch (Node 18+)

      - name: Validate inputs and required secrets
        run: |
          set -euo pipefail
          if [ -z "${PROBE_EMAIL:-}" ] || [ -z "${PROBE_PASSWORD:-}" ]; then
            echo "::error::PROD_PROBE_EMAIL / PROD_PROBE_PASSWORD must be set as production-environment secrets"; exit 1
          fi
          # Validate via env vars (grep -q never prints them) — no interpolation.
          printf '%s' "$GEN_ID" | grep -Eq '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$' \
            || { echo "::error::generation_id is not a uuid"; exit 1; }
          printf '%s' "$PROBE_EMAIL" | grep -Eq '^gate-probe-[a-z0-9-]+@twinai\.internal$' \
            || { echo "::error::PROD_PROBE_EMAIL must use the fixed gate-probe-*@twinai.internal prefix"; exit 1; }

      - name: Install ffmpeg (fixture generation only)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends ffmpeg

      - name: Generate probe fixture (ffmpeg)
        run: |
          set -euo pipefail
          ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc=size=320x240:rate=30:duration=2 \
            -f lavfi -i sine=frequency=440:duration=2 -c:v libvpx -b:v 200k -c:a libvorbis -shortest /tmp/probe.webm
          SIZE=$(stat -c%s /tmp/probe.webm)
          echo "fixture bytes=$SIZE"
          { echo "SIZE=$SIZE"; echo "FIXTURE=/tmp/probe.webm"; } >> "$GITHUB_ENV"

      # STAGE 1 — FUNCTIONAL CHAIN. Runs the SAME executable module the harness
      # exercises (scripts/prod-smoke/smoke_chain.mjs): sign in → persist recovery
      # ids BEFORE create → create → parse → persist asset → signed PUT → finalize
      # → poll ready → verify preserved metadata merge → poll generation pointer.
      # The module persists all recovery state to $GITHUB_ENV (so the always-run
      # residue step can account even if this fails) and PROBE_FUNCTIONAL_CHAIN
      # = pass|fail:<stage>. A PASS here is the functional-chain evidence; it is a
      # SEPARATE signal from the overall workflow conclusion (which the residue
      # accounting will intentionally turn RED — see the protocol below).
      - name: 'Stage 1 — functional chain (create → ready → metadata → pointer)'
        env:
          PROBE_BASE_URL: https://jmdecibuytznsonrasxw.supabase.co
        run: |
          set -euo pipefail
          # anon key from the committed web env; passed to the node process via a
          # per-command env var (not argv). Credentials come from job env.PROBE_*.
          ANON=$(grep '^VITE_SUPABASE_ANON_KEY=' apps/web/.env.production | cut -d= -f2)
          PROBE_ANON_KEY="$ANON" node scripts/prod-smoke/smoke_chain.mjs

      # HONEST RESIDUE ACCOUNTING — runs even if the chain above failed
      # (if: always()). It runs the SAME control-flow module the failure-injection
      # harness exercises (scripts/prod-smoke/residue_flow.mjs) so behaviour is
      # unit-tested, not hand-copied shell. That module implements the three cases
      # (A: no create → clean; B: create attempted, no assetId → all UNKNOWN, fail
      # closed; C: assetId known → OBSERVE each artifact) and the honest
      # observation truth table: only a documented, unambiguous missing result
      # (Storage 404, a valid empty PostgREST array) yields `false`; a 400 / 401 /
      # 403 / 5xx / network error / malformed body yields "unknown", never false.
      # This step is NOT self-cleaning: the `takes` bucket has NO DELETE policy
      # (proven by scripts/ci/check_takes_delete_policy.mjs), so the probe user
      # cannot delete its own take object — the DELETE is best-effort and its
      # result is OBSERVED, not assumed. The media_assets row, the
      # generations.source_asset_id pointer, and the service-side
      # validate_source job/event state are also NOT client-removable. Any
      # PRESENT-or-UNKNOWN artifact FAILS CLOSED with a RECOVERABLE-ARTIFACT
      # REPORT → sanctioned operator retention. (Never SQL-delete storage.objects.)
      - name: Account for probe residue and fail closed (always)
        if: always()
        run: node scripts/prod-smoke/residue_flow.mjs

      # TWO-STAGE PROTOCOL VERDICT (always). This workflow is EXPECTED to end
      # RED: the residue step fails closed because validation_job_events is never
      # client-observable, so an attempted-create smoke can never be "clean". A
      # red conclusion is therefore NOT a failed functional smoke — the pass
      # signal is PROBE_FUNCTIONAL_CHAIN=pass emitted by Stage 1. See
      # docs/prod-source-smoke-protocol.md for the full operational protocol:
      #   Stage 1 functional-chain evidence (this marker = pass)
      #   → Stage 2 recoverable-artifact report (intentionally nonzero)
      #   → sanctioned operator retention cleanup
      #   → supported zero-delta verification (A2 query).
      - name: Two-stage protocol verdict (always)
        if: always()
        run: |
          echo "## Prod-source-smoke — two-stage verdict" >> "$GITHUB_STEP_SUMMARY"
          echo "- Stage 1 (functional chain): **${PROBE_FUNCTIONAL_CHAIN:-not-run}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Stage 2 (residue accounting): **RED by design** — recoverable-artifact handoff, not a functional failure." >> "$GITHUB_STEP_SUMMARY"
          echo "- A green functional chain WITH a red residue step is the expected outcome; see docs/prod-source-smoke-protocol.md." >> "$GITHUB_STEP_SUMMARY"
          if [ "${PROBE_FUNCTIONAL_CHAIN:-}" != "pass" ]; then
            echo "::warning::functional chain did NOT pass (${PROBE_FUNCTIONAL_CHAIN:-not-run}); this is a real smoke failure, not the expected residue-only red."
          fi
