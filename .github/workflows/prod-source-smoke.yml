# Controlled PRODUCTION smoke of the Phase-1 source chain — required after any
# change to validate_source (Phase 4 changed how ready-state metadata is
# written). Runs the REAL flow as a signed-in probe user:
#   create source asset → signed upload → finalize → validate_source (VPS
#   worker) → ready → generation pointer linked
# then proves the database-level metadata merge preserved EVERYTHING.
#
# SAFETY ENVELOPE (this workflow touches production):
#   * workflow_dispatch ONLY — no push/PR/schedule/repository_dispatch
#   * refuses to run from any ref except main (no arbitrary-ref execution)
#   * inputs are ONLY probe credentials + a pre-created generation uuid
#     (validated); target URL, function names, bucket and paths are pinned —
#     nothing caller-provided reaches them
#   * least privilege: uses ONLY the public anon key from the committed web
#     env + the probe user's own session; no repository secrets at all — it
#     CANNOT read service keys, set EDITOR_V2_START_ENABLED, apply
#     migrations, or deploy anything
#   * access token and signed upload URL are masked before first use; error
#     paths print redacted bodies only
#   * probe identity uses the fixed gate-probe-* prefix; cleanup of the probe
#     user/generation runs operator-side through the sanctioned retention
#     path (this job creates nothing durable beyond the one probe asset, and
#     its runner scratch dies with the runner)
name: Production source-validation smoke
on:
  workflow_dispatch:
    inputs:
      probe_email:
        description: 'Throwaway probe user email (gate-probe-* prefix)'
        required: true
      probe_password:
        description: 'Throwaway probe user password'
        required: true
      generation_id:
        description: 'Pre-created probe generation id (uuid)'
        required: true

# Kill switch / no overlap: one production smoke at a time. Attach
# required-reviewer protection to the `production` environment in repo settings
# so each run needs human approval before it can create anything.
concurrency:
  group: prod-source-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Refuse non-main refs
        run: |
          [ "$GITHUB_REF_NAME" = "main" ] || { echo "::error::runs only from main"; exit 1; }

      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          echo '${{ inputs.generation_id }}' | grep -Eq '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$' \
            || { echo "::error::generation_id is not a uuid"; exit 1; }
          echo '${{ inputs.probe_email }}' | grep -Eq '^gate-probe-[a-z0-9-]+@twinai\.internal$' \
            || { echo "::error::probe_email must use the fixed gate-probe-*@twinai.internal prefix"; exit 1; }

      - name: Install ffmpeg (fixture generation only)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends ffmpeg

      - name: Run the real source chain and verify preserved metadata
        run: |
          set -euo pipefail
          BASE="https://jmdecibuytznsonrasxw.supabase.co"
          ANON=$(grep '^VITE_SUPABASE_ANON_KEY=' apps/web/.env.production | cut -d= -f2)

          ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc=size=320x240:rate=30:duration=2 \
            -f lavfi -i sine=frequency=440:duration=2 -c:v libvpx -b:v 200k -c:a libvorbis -shortest /tmp/probe.webm
          SIZE=$(stat -c%s /tmp/probe.webm)
          echo "fixture bytes=$SIZE"

          TOKEN=$(curl -sS -X POST "$BASE/auth/v1/token?grant_type=password" \
            -H "apikey: $ANON" -H 'Content-Type: application/json' \
            -d "{\"email\":\"${{ inputs.probe_email }}\",\"password\":\"${{ inputs.probe_password }}\"}" | jq -r .access_token)
          [ -n "$TOKEN" ] && [ "$TOKEN" != "null" ] || { echo "probe sign-in failed"; exit 1; }
          echo "::add-mask::$TOKEN"
          # Export creds so the ALWAYS-run cleanup step can delete the object
          # even if a later assertion in this step fails. (TOKEN is masked.)
          {
            echo "PROBE_BASE=$BASE"
            echo "PROBE_ANON=$ANON"
            echo "PROBE_TOKEN=$TOKEN"
          } >> "$GITHUB_ENV"

          ATTEMPT=$(uuidgen)
          CREATE=$(curl -sS -X POST "$BASE/functions/v1/source-asset" \
            -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
            -d "{\"action\":\"create\",\"generation_id\":\"${{ inputs.generation_id }}\",\"recording_attempt_id\":\"$ATTEMPT\",\"content_type\":\"video/webm\",\"size_bytes\":$SIZE}")
          ASSET=$(echo "$CREATE" | jq -r .assetId)
          SIGNED=$(echo "$CREATE" | jq -r .signedUrl)
          if [ -z "$ASSET" ] || [ "$ASSET" = "null" ]; then
            echo "create failed: $(echo "$CREATE" | jq 'del(.signedUrl, .token)')"; exit 1
          fi
          echo "::add-mask::$SIGNED"
          echo "asset=$ASSET"
          echo "PROBE_ASSET=$ASSET" >> "$GITHUB_ENV"

          PUT=$(curl -sS -o /dev/null -w '%{http_code}' -X PUT "$SIGNED" \
            -H 'x-upsert: true' -H 'content-type: video/webm' --data-binary @/tmp/probe.webm)
          [ "$PUT" -lt 300 ] || { echo "signed PUT failed: $PUT"; exit 1; }

          FIN=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$BASE/functions/v1/source-asset" \
            -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
            -d "{\"action\":\"finalize\",\"asset_id\":\"$ASSET\"}")
          [ "$FIN" = "200" ] || { echo "finalize failed: $FIN"; exit 1; }

          # Poll via the probe user's OWN RLS-scoped read until the production
          # worker validates it.
          STATUS=""
          for i in $(seq 1 60); do
            ROW=$(curl -sS "$BASE/rest/v1/media_assets?id=eq.$ASSET&select=status,storage_path,content_sha256,duration_ms,width,height,rotation,has_audio,metadata" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" | jq '.[0]')
            STATUS=$(echo "$ROW" | jq -r .status)
            [ "$STATUS" = "ready" ] && break
            [ "$STATUS" = "rejected" ] && { echo "REJECTED: $(echo "$ROW" | jq .metadata)"; exit 1; }
            sleep 3
          done
          [ "$STATUS" = "ready" ] || { echo "asset never became ready (last: $STATUS)"; exit 1; }
          echo "ready row (facts + metadata keys):"
          echo "$ROW" | jq '{status, duration_ms, width, height, rotation, has_audio, sha_len: (.content_sha256|length), meta_keys: (.metadata|keys), probe_facts: .metadata.probe_facts, container: .metadata.container, video_codec: .metadata.video_codec, audio_codec: .metadata.audio_codec, editor_eligible: .metadata.editor_eligible, has_finalized_etag: (.metadata.finalized_etag != null), finalized_bytes: .metadata.finalized_bytes}'

          echo "$ROW" | jq -e '
            .status == "ready"
            and .metadata.finalized_etag != null
            and (.metadata.finalized_bytes | tonumber) > 0
            and .metadata.probe_facts.frame_rate != null
            and .metadata.container != null
            and .metadata.video_codec != null
            and .metadata.audio_codec != null
            and .metadata.editor_eligible == true
            and (.content_sha256 | length) == 64
            and .duration_ms > 1500 and .has_audio == true
            and .width == 320 and .height == 240 and .rotation == 0
          ' > /dev/null || { echo "METADATA MERGE VERIFICATION FAILED"; exit 1; }

          # Generation pointer must link to the probe asset (RLS-scoped read).
          # The ready flip and the link are consecutive worker statements —
          # poll briefly instead of racing the gap (same as the staging matrix).
          PTR=""
          for i in $(seq 1 20); do
            PTR=$(curl -sS "$BASE/rest/v1/generations?id=eq.${{ inputs.generation_id }}&select=source_asset_id" \
              -H "apikey: $ANON" -H "Authorization: Bearer $TOKEN" | jq -r '.[0].source_asset_id')
            [ "$PTR" = "$ASSET" ] && break
            sleep 2
          done
          [ "$PTR" = "$ASSET" ] || { echo "GENERATION POINTER NOT LINKED (got $PTR)"; exit 1; }
          echo "generation pointer linked — metadata merge preserved all finalization + probe facts — PASS"

      # GUARANTEED SUPPORTED-API CLEANUP — runs even if the chain above failed
      # (if: always()), so a partial run never leaves an orphaned probe object.
      # Deletes THROUGH the Storage API with the probe user's OWN session (RLS
      # allows owners to delete their own objects), which removes the metadata
      # row AND the backend blob together while the row still exists. Never
      # delete storage.objects rows by SQL: that strips the row's version
      # pointer and orphans the backend blob.
      - name: Cleanup the probe object via the Storage API (always)
        if: always()
        run: |
          set -uo pipefail
          [ -n "${PROBE_ASSET:-}" ] || { echo "no probe asset created — nothing to clean"; exit 0; }
          OBJPATH=$(curl -sS "$PROBE_BASE/rest/v1/media_assets?id=eq.$PROBE_ASSET&select=storage_path" \
            -H "apikey: $PROBE_ANON" -H "Authorization: Bearer $PROBE_TOKEN" | jq -r '.[0].storage_path // empty')
          if [ -z "$OBJPATH" ]; then echo "no storage_path (asset row absent) — nothing to clean"; exit 0; fi
          PATH_ENC=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1]))" "$OBJPATH")
          DEL=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE \
            "$PROBE_BASE/storage/v1/object/takes/$PATH_ENC" \
            -H "apikey: $PROBE_ANON" -H "Authorization: Bearer $PROBE_TOKEN")
          echo "cleanup delete status=$DEL"
          GONE=$(curl -sS -o /dev/null -w '%{http_code}' \
            "$PROBE_BASE/storage/v1/object/takes/$PATH_ENC" \
            -H "apikey: $PROBE_ANON" -H "Authorization: Bearer $PROBE_TOKEN")
          echo "post-cleanup object fetch status=$GONE (expect 400/404)"
          case "$GONE" in
            400|404) echo "object cleaned via supported API — no orphan left" ;;
            *) echo "::error::OBJECT STILL PRESENT AFTER DELETE ($GONE) — recoverable probe object $OBJPATH left for operator; do NOT SQL-delete its row"; exit 1 ;;
          esac
