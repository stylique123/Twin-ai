# Deploys Supabase Edge Functions from GitHub `main` (single source of truth).
# On any push touching supabase/functions/, deploys ALL functions to the project.
#
# One-time setup — repo Settings → Secrets and variables → Actions:
#   SUPABASE_ACCESS_TOKEN  — a Supabase personal access token (sbp_…).
# Project ref is non-secret and pinned below.

name: Deploy edge functions
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['supabase/functions/**', '.github/workflows/deploy-edge.yml']

concurrency:
  group: deploy-edge
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set — add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          supabase functions deploy --project-ref jmdecibuytznsonrasxw
