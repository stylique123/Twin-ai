# Deploys the TwinAI worker to the VPS (where it actually runs as the
# `twinai-worker` Docker container). GitHub `main` is the single source of truth:
# on every push that touches worker/, this SSHes to the VPS, pulls the repo,
# rebuilds the image, and recreates the container with the existing env file.
#
# One-time setup — repo Settings → Secrets and variables → Actions:
#   VPS_SSH_KEY  — a private SSH key whose PUBLIC key is in the VPS's
#                  /root/.ssh/authorized_keys (a dedicated deploy key).
# (Host + container env live on the box; nothing else secret is needed here.)

name: Deploy worker
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['worker/**', '.github/workflows/deploy-worker.yml']

concurrency:
  group: deploy-worker
  cancel-in-progress: false

env:
  VPS_HOST: 138.201.119.239

jobs:
  # Gate: never ship a worker that doesn't compile (main has no other guard —
  # pr-checks runs on PRs, but a direct push to main would skip it).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Typecheck worker
        working-directory: worker
        run: |
          npm ci
          npx tsc --noEmit

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS over SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::VPS_SSH_KEY secret is not set — add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          # Pinned host key, strict verification, fail-closed (no ssh-keyscan /
          # StrictHostKeyChecking=no — those trust a possibly-spoofed host). The
          # host key comes from the protected VPS_KNOWN_HOSTS secret. Never printed.
          if [ -z "$VPS_KNOWN_HOSTS" ]; then
            echo "::error::VPS_KNOWN_HOSTS secret is not set — refusing to SSH without a pinned host key (MITM risk). See DEPLOY.md → 'Pinning the VPS host key'."
            exit 1
          fi
          mkdir -p ~/.ssh; chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts_vps"
          chmod 600 "$HOME/.ssh/known_hosts_vps"
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$HOME/.ssh/known_hosts_vps" root@"$VPS_HOST" 'bash -se' <<'REMOTE'
            set -euo pipefail
            cd /opt/twinai-worker-src
            # Reset to the JUST-FETCHED main (FETCH_HEAD), not the remote-tracking
            # ref origin/main — the repo's fetch refspec doesn't update origin/main,
            # so `reset --hard origin/main` could land on a stale commit.
            git fetch origin main
            git reset --hard FETCH_HEAD
            # Old-editor cleanup: drop Revideo wiring from the box env, remove the
            # Revideo container + image, and drop the retired job types (autoedit,
            # transcribe) from the box's WORKER_JOB_TYPES override so the box config
            # matches the canonical code registry in worker/src/env.ts:
            # {ingest, build_voice, scrape_dna, validate_source, editor_v2}.
            # transcribe was retired (ingest-reference enqueues 'ingest'); autoedit
            # was removed with the old editor. Neither has a handler, so a stale
            # override would only make the worker claim jobs it can't run.
            sed -i '/^REVIDEO_/d;/^PEXELS_API_KEY/d;/^MUSIC_BED_URL/d;/^EDIT_/d' /opt/twinai-worker.env || true
            # Drop the box's WORKER_JOB_TYPES override entirely: the code default in
            # worker/src/env.ts is the single source of truth for job types now.
            # (A stale override once kept retired types alive AND would silently
            # exclude newly-registered types like validate_source.)
            sed -i '/^WORKER_JOB_TYPES=/d' /opt/twinai-worker.env || true
            echo "worker job types: code default (see worker/src/env.ts jobTypes)"
            docker rm -f twinai-revideo 2>/dev/null || true
            docker rmi -f twinai-revideo 2>/dev/null || true
            echo "revideo container: $(docker ps -a --filter name=twinai-revideo -q | grep -q . && echo STILL-PRESENT || echo removed)"
            echo "port 4500 listener: $(ss -tlnp 2>/dev/null | grep -q ':4500 ' && echo STILL-LISTENING || echo none)"
            # Keep the last-good image so a boot-crashing build can roll back
            # instead of leaving NOTHING running (the old rm-then-run had no net).
            docker tag twinai-worker twinai-worker:prev 2>/dev/null || true
            docker build -t twinai-worker worker/
            docker rm -f twinai-worker 2>/dev/null || true
            docker run -d --name twinai-worker --restart unless-stopped \
              --env-file /opt/twinai-worker.env twinai-worker
            sleep 8
            if ! docker ps --filter name=twinai-worker --filter status=running -q | grep -q .; then
              echo "::error::new worker image crashed on boot — rolling back to previous image"
              docker logs --tail 30 twinai-worker || true
              docker rm -f twinai-worker 2>/dev/null || true
              docker run -d --name twinai-worker --restart unless-stopped \
                --env-file /opt/twinai-worker.env twinai-worker:prev
              exit 1
            fi
            docker image prune -f >/dev/null 2>&1 || true
            echo "deployed: $(git rev-parse --short HEAD)"
            docker logs --tail 3 twinai-worker
            docker ps --filter name=twinai-worker --format 'STATUS: {{.Status}}'
          REMOTE
