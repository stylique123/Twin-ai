# Deploys the TwinAI worker (yt-dlp + faster-whisper + job-queue poller) to Fly.io.
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   FLY_API_TOKEN              — from `fly tokens create deploy` or dashboard
#   SUPABASE_SERVICE_ROLE_KEY  — Supabase project service-role key (server-side only)
#   GEMINI_API_KEY             — Gemini key (structure derivation + voice synthesis)
#   APIFY_TOKEN                — Apify API token; YouTube captions (yt-dlp is bot-blocked
#                                on YouTube from datacenter IPs). Free tier covers normal use.
#
# Then run this workflow manually (Actions tab → Deploy worker → Run workflow),
# or it auto-runs when worker/ changes on the main branches.

name: Deploy worker
on:
  workflow_dispatch: {}
  push:
    branches: [main, claude/nice-mccarthy-83efee]
    paths: ['worker/**', '.github/workflows/deploy-worker.yml']

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create app if missing
        run: flyctl apps create twinai-worker || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Only stage APIFY_TOKEN. SUPABASE_* and GEMINI_API_KEY are already set
      # directly on the Fly app; re-staging them from (empty) GitHub secrets would
      # WIPE the live values and break the worker. Leave them untouched.
      - name: Stage APIFY_TOKEN secret
        run: |
          flyctl secrets set --app twinai-worker --stage \
            APIFY_TOKEN="${{ secrets.APIFY_TOKEN }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy worker/ --remote-only --app twinai-worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
