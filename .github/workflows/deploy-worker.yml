# Deploys the TwinAI worker to the VPS (where it actually runs as the
# `twinai-worker` Docker container). GitHub `main` is the single source of truth:
# on every push that touches worker/, this SSHes to the VPS, pulls the repo,
# rebuilds the image, and recreates the container with the existing env file.
#
# One-time setup — repo Settings → Secrets and variables → Actions:
#   VPS_SSH_KEY  — a private SSH key whose PUBLIC key is in the VPS's
#                  /root/.ssh/authorized_keys (a dedicated deploy key).
# (Host + container env live on the box; nothing else secret is needed here.)

name: Deploy worker
on:
  workflow_dispatch: {}
  push:
    branches: [main, claude/nice-mccarthy-83efee]
    paths: ['worker/**', '.github/workflows/deploy-worker.yml']

concurrency:
  group: deploy-worker
  cancel-in-progress: false

env:
  VPS_HOST: 138.201.119.239

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS over SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::VPS_SSH_KEY secret is not set — add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" 'bash -se' <<'REMOTE'
            set -euo pipefail
            cd /opt/twinai-worker-src
            git fetch origin main
            git reset --hard origin/main
            docker build -t twinai-worker worker/
            docker rm -f twinai-worker 2>/dev/null || true
            docker run -d --name twinai-worker --restart unless-stopped \
              --env-file /opt/twinai-worker.env twinai-worker
            docker image prune -f >/dev/null 2>&1 || true
            sleep 3
            echo "deployed: $(git rev-parse --short HEAD)"
            docker logs --tail 3 twinai-worker
            docker ps --filter name=twinai-worker --format 'STATUS: {{.Status}}'
          REMOTE
