# Editor v2 Phase 1 — the REAL integration gate, run against the DEDICATED
# staging Supabase project (twinai-phase1-staging). Never touches production.
#
# Auth is keyless: the runner proves its identity with a GitHub OIDC token and
# the staging-only `ci-bootstrap` edge function verifies it (issuer + audience +
# exact repository + exact branch) before returning the staging keys. Nothing
# secret lives in this public repository.
#
# The harness exercises the full chain the DB-only tests cannot:
#   client → source-asset edge fn → signed Storage upload → finalize RPC
#   → validate_source job → REAL worker (ffprobe) → ready → generation pointer
# including concurrency, refresh/second-device recovery, token lifecycle,
# a real media rejection matrix, worker kill/recovery, and the retake race.
name: staging-integration

# Runs on every push to an editor-v2 phase branch (the ci-bootstrap credential
# gate only answers to THIS workflow file on those refs or main), and via
# dispatch once the file is on the default branch.
on:
  workflow_dispatch:
  push:
    branches: ['rebuild/editor-v2-*']

permissions:
  id-token: write
  contents: read

# The matrices run against ONE shared staging project — two overlapping runs
# would drain/settle each other's fixtures. Strictly serialize.
concurrency:
  group: staging-integration
  cancel-in-progress: false

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Phases 3-5 all drive the REAL speech stage, which now loads the PINNED
    # snapshot from this path offline (fetched + digest-verified in the install
    # step). Job-level so EVERY phase inherits it, not just Phase 5. NOTE: the
    # `runner` context is NOT available in job-level env — use github.workspace.
    env:
      EDITOR_SPEECH_MODEL_PATH: ${{ github.workspace }}/.pinned-model
      # Phase-6 build provenance: the boot manifest requires a 40-hex commit
      # (editor_pin_manifest rejects a hollow manifest). The staging workers run
      # the built dist/ directly (not the Docker image), so inject the exact
      # head commit here — every spawned worker inherits it via process.env.
      WORKER_GIT_SHA: ${{ github.sha }}
      # Phase-7: the REAL directing stage makes one pinned gemini-3.5-flash call.
      # The spawned staging worker (EDITOR_DIRECTOR_ENABLED=true, set per-worker
      # in phase7.mjs) inherits this key via process.env; Gate 0's real
      # countTokens uses it too. Absent => Gate 0 self-tests offline and the
      # Phase-7 fail-closed case still passes.
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ffmpeg + espeak-ng (fixtures & audio extraction)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends ffmpeg espeak-ng

      # The worker's Phase-5 speech stage shells out to python3 + faster-whisper
      # (phases 3-5 all drive it now that `transcribing` is real). Pinned — a
      # mutable ASR dependency would silently move the component contract.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the worker's pinned Python deps + fetch the PINNED ASR model
        # SAME locked source the Docker image installs from (worker/
        # requirements.txt) — the speech component's ASR/VAD stack is identical
        # in CI and on the VPS.
        run: |
          pip install --quiet -r worker/requirements.txt
          # OpenCV runtime with ENFORCED wheel SHA-256 (same as the Docker build):
          # --require-hashes fails the install if the wheel bytes don't match.
          pip install --quiet --require-hashes -r worker/requirements-opencv.txt
          # Offline verifier guard (mirror of the build): a digest mismatch must fail.
          python worker/scripts/test_fetch_model.py
          python worker/scripts/test_editor_speech_pin.py
          python worker/scripts/test_editor_speech_offline.py
          # tiny = the fast model Phase-3/4 pin (alias is fine — not immutable).
          python -c "from faster_whisper import WhisperModel; WhisperModel('tiny', device='cpu', compute_type='int8')"
          # small = the SHIPPED Phase-5 model — fetch the EXACT pinned revision and
          # digest-verify it (speech-6). Same fetch_model.py the Docker build runs.
          python worker/scripts/fetch_model.py \
            --manifest worker/models/faster-whisper-small.manifest.json \
            --dest "$GITHUB_WORKSPACE/.pinned-model"

      - name: Verify the ci-bootstrap gate refuses unauthorized callers
        run: |
          # (a) no token → 400
          A=$(curl -s -o /dev/null -w '%{http_code}' -X POST "https://otgzjsagybpgtwweuptj.supabase.co/functions/v1/ci-bootstrap" \
            -H 'Content-Type: application/json' -d '{}')
          # (b) garbage token → 403
          B=$(curl -s -o /dev/null -w '%{http_code}' -X POST "https://otgzjsagybpgtwweuptj.supabase.co/functions/v1/ci-bootstrap" \
            -H 'Content-Type: application/json' -d '{"token":"eyJhbGciOiJSUzI1NiJ9.eyJmYWtlIjp0cnVlfQ.forged"}')
          # (c) REAL OIDC token but the WRONG audience → 403 (proves the gate
          # verifies claims, not just signatures)
          WRONG=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=some-other-audience" | jq -r .value)
          C=$(curl -s -o /dev/null -w '%{http_code}' -X POST "https://otgzjsagybpgtwweuptj.supabase.co/functions/v1/ci-bootstrap" \
            -H 'Content-Type: application/json' -d "{\"token\":\"$WRONG\"}")
          echo "no-token=$A garbage=$B wrong-audience=$C"
          [ "$A" = "400" ] && [ "$B" = "403" ] && [ "$C" = "403" ] || { echo "BOOTSTRAP GATE FAILED TO REFUSE"; exit 1; }

      - name: Fetch staging credentials via GitHub OIDC (keyless)
        run: |
          OIDC=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=twinai-staging-integration" | jq -r .value)
          RESP=$(curl -sS -X POST "https://otgzjsagybpgtwweuptj.supabase.co/functions/v1/ci-bootstrap" \
            -H 'Content-Type: application/json' -d "{\"token\":\"$OIDC\"}")
          SERVICE=$(echo "$RESP" | jq -r .serviceRoleKey)
          ANON=$(echo "$RESP" | jq -r .anonKey)
          URL=$(echo "$RESP" | jq -r .url)
          if [ -z "$SERVICE" ] || [ "$SERVICE" = "null" ]; then
            echo "bootstrap failed: $(echo "$RESP" | jq -r '.error // "no error field"')"; exit 1
          fi
          echo "::add-mask::$SERVICE"
          {
            echo "STAGING_URL=$URL"
            echo "STAGING_ANON_KEY=$ANON"
            echo "STAGING_SERVICE_ROLE_KEY=$SERVICE"
          } >> "$GITHUB_ENV"

      # Pinned (not 'latest'): resolving the latest release hits the GitHub API
      # unauthenticated from shared runner IPs and rate-limits sporadically —
      # and a mutable toolchain weakens reproducibility anyway.
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Deploy THIS BRANCH's editor edge functions to STAGING
        # The functions under test must be the branch's code, not a hand-pushed
        # copy. Deploys ONLY to the staging project — production deploys stay
        # exclusively on deploy-edge.yml (main).
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set"; exit 1
          fi
          supabase functions deploy source-asset --project-ref otgzjsagybpgtwweuptj
          supabase functions deploy start-editor-v2 --project-ref otgzjsagybpgtwweuptj

      - name: Build worker (the real one that will run in production)
        run: cd worker && npm ci && npm run build

      - name: Harness dependency
        run: npm i --no-save --no-audit --no-fund @supabase/supabase-js@2

      - name: Prove the DISABLED start gate (env unset = fail closed)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets unset EDITOR_V2_START_ENABLED --project-ref otgzjsagybpgtwweuptj || true
          sleep 20   # secret changes restart the function runtime
          node scripts/staging-integration/phase2-disabled.mjs

      - name: Prove an INVALID gate value stays disabled (only exactly 'true' enables)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set EDITOR_V2_START_ENABLED=1 --project-ref otgzjsagybpgtwweuptj
          sleep 20
          node scripts/staging-integration/phase2-disabled.mjs

      - name: Enable the start gate for the staging matrices
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set EDITOR_V2_START_ENABLED=true --project-ref otgzjsagybpgtwweuptj
          sleep 20

      - name: Run Phase 1 integration matrix (source-asset chain)
        run: node scripts/staging-integration/run.mjs

      - name: Run Phase 2 integration matrix (start-editor-v2)
        run: node scripts/staging-integration/phase2.mjs

      - name: Run Phase 3 integration matrix (editor_v2 worker orchestration)
        run: node scripts/staging-integration/phase3.mjs

      - name: Run Phase 4 integration matrix (real media inspection)
        run: node scripts/staging-integration/phase4.mjs

      - name: Run Phase 5 integration matrix (real speech transcription)
        # EDITOR_SPEECH_MODEL_PATH is set at job level (all phases drive speech).
        run: node scripts/staging-integration/phase5.mjs

      - name: Run Phase 6 integration matrix (real analyzing — manifest pin, digest components, capacity)
        # opencv-python-headless is installed by the pinned requirements step
        # above; the YuNet .onnx + vision manifest are committed in-repo.
        run: node scripts/staging-integration/phase6.mjs

      - name: Run Phase 7 integration matrix (real directing — Director call, decision, filler guards)
        # Requires migration 0088 (edit_director_calls/decisions + RPCs) applied
        # to staging. EDITOR_DIRECTOR_ENABLED is set PER-WORKER inside phase7.mjs
        # (never a Supabase secret) so production stays simulated. GEMINI_API_KEY
        # is threaded via job env above.
        run: node scripts/staging-integration/phase7.mjs
