name: PR checks
# The safety net that was missing: nothing used to compile-check a PR, so a TS
# error in packages/shared or worker/ could merge to main and auto-deploy broken.
# Every deploy workflow triggers on push-to-main; this one gates the merge.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  web-and-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Typecheck all workspaces
        run: npm run typecheck
      - name: Build web
        run: npm run web:build

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Typecheck worker
        working-directory: worker
        run: |
          npm ci
          npx tsc --noEmit

  # Focused automated tests for Part 1 (old-editor removal + retained-flow contract).
  # Shared: the client API surface can no longer construct an editor call, and the
  # recording/teleprompter data path still builds from a blueprint. Worker: the job
  # registry cannot claim `autoedit` and the editor env flags are gone.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        # Node 22: the worker registry test transitively loads @supabase/supabase-js,
        # which needs a native WebSocket (Node 22+) — the same reason the worker's
        # Docker image is Node 22.
        with: { node-version: 22 }
      - name: Install + test @twinai/shared
        run: |
          npm ci
          npm test -w @twinai/shared
      - name: Install + test worker
        working-directory: worker
        run: |
          npm ci
          npm test

  # Model-pin integrity (speech-6): the digest verifier, the bridge fail-closed
  # paths, and the pin/version coupling guard. All run OFFLINE with no model —
  # editor_speech.py returns exit 3 before faster-whisper is imported.
  model-pin-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # merge-base needed for the coupling check
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Verifier + bridge fail-closed tests (offline)
        run: |
          python worker/scripts/test_fetch_model.py
          python worker/scripts/test_editor_speech_pin.py
      - name: Model-pin / analyzer-version coupling (selftest + PR guard)
        run: |
          node scripts/ci/check_model_pin_coupling.mjs --selftest
          node scripts/ci/check_model_pin_coupling.mjs

  # Guard: the OLD AI editor AND the old manual/timeline/Refine/EDL editor were
  # removed (see docs/ai-editor-rebuild-status.md + docs/manual-editor-remnant-inventory.md).
  # Fail any change that reintroduces their entry points into live code. Historical
  # migrations and the removal docs are excluded on purpose; the new editor must
  # use new names, not resurrect these. NOTE: the generic word "timeline" is NOT
  # forbidden — the recording Scene Timeline and future internal planning code use
  # it legitimately; behavior is reviewed separately.
  no-legacy-editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No legacy editor references in live code
        run: |
          if grep -rnE 'enqueue-autoedit|handleAutoEdit|autoEditTake|autoEditFromPath|reEditWithEdl|fetchEdl|pollEditJob|EditDecisionList|ManualEditor|TimelineEditor|RefineEditor|manual-rerender|REVIDEO_URL|REVIDEO_TRUSTED|twinai-revideo' \
              apps/web/src packages/shared/src worker/src supabase/functions supabase/config.toml \
              --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=__tests__ --exclude='*.test.ts'; then
            echo '::error::Legacy editor reference detected — the old AI/manual editor was removed; do not reintroduce its entry points.'
            exit 1
          fi
          echo "clean: no legacy editor references"
      - name: Worker registry must not register autoedit
        run: |
          if grep -n "autoedit" worker/src/jobs/index.ts | grep -v "removed"; then
            echo '::error::autoedit handler reappeared in the worker registry.'
            exit 1
          fi
          echo "clean: worker registry has no autoedit handler"
