name: PR checks
# The safety net that was missing: nothing used to compile-check a PR, so a TS
# error in packages/shared or worker/ could merge to main and auto-deploy broken.
# Every deploy workflow triggers on push-to-main; this one gates the merge.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  web-and-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Typecheck all workspaces
        run: npm run typecheck
      - name: Build web
        run: npm run web:build

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Typecheck worker
        working-directory: worker
        run: |
          npm ci
          npx tsc --noEmit

  # Focused automated tests for Part 1 (old-editor removal + retained-flow contract).
  # Shared: the client API surface can no longer construct an editor call, and the
  # recording/teleprompter data path still builds from a blueprint. Worker: the job
  # registry cannot claim `autoedit` and the editor env flags are gone.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        # Node 22: the worker registry test transitively loads @supabase/supabase-js,
        # which needs a native WebSocket (Node 22+) — the same reason the worker's
        # Docker image is Node 22.
        with: { node-version: 22 }
      - name: Install + test @twinai/shared
        run: |
          npm ci
          npm test -w @twinai/shared
      - name: Install + test worker
        working-directory: worker
        run: |
          npm ci
          npm test

  # Model-pin integrity (speech-6): the digest verifier, the bridge fail-closed
  # paths, and the pin/version coupling guard. All run OFFLINE with no model —
  # editor_speech.py returns exit 3 before faster-whisper is imported.
  model-pin-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # merge-base needed for the coupling check
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Verifier + bridge fail-closed tests (offline)
        run: |
          python worker/scripts/test_fetch_model.py
          python worker/scripts/test_editor_speech_pin.py
          python worker/scripts/test_editor_speech_offline.py
      - name: Visual bridge pin verification + canonical-json parity (offline, no cv2)
        run: python worker/scripts/test_editor_visual_offline.py
      - name: Model-pin / analyzer-version coupling (selftest + PR guard)
        run: |
          node scripts/ci/check_model_pin_coupling.mjs --selftest
          node scripts/ci/check_model_pin_coupling.mjs
      - name: Publish vps_bench.sh sha256 (for the founder's self-verifying download)
        run: |
          echo "vps_bench.sh sha256: $(sha256sum worker/scripts/vps_bench.sh | cut -d' ' -f1)"

  # Guard: the OLD AI editor AND the old manual/timeline/Refine/EDL editor were
  # removed (see docs/ai-editor-rebuild-status.md + docs/manual-editor-remnant-inventory.md).
  # Fail any change that reintroduces their entry points into live code. Historical
  # migrations and the removal docs are excluded on purpose; the new editor must
  # use new names, not resurrect these. NOTE: the generic word "timeline" is NOT
  # forbidden — the recording Scene Timeline and future internal planning code use
  # it legitimately; behavior is reviewed separately.
  no-legacy-editor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No legacy editor references in live code
        run: |
          if grep -rnE 'enqueue-autoedit|handleAutoEdit|autoEditTake|autoEditFromPath|reEditWithEdl|fetchEdl|pollEditJob|EditDecisionList|ManualEditor|TimelineEditor|RefineEditor|manual-rerender|REVIDEO_URL|REVIDEO_TRUSTED|twinai-revideo' \
              apps/web/src packages/shared/src worker/src supabase/functions supabase/config.toml \
              --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=__tests__ --exclude='*.test.ts'; then
            echo '::error::Legacy editor reference detected — the old AI/manual editor was removed; do not reintroduce its entry points.'
            exit 1
          fi
          echo "clean: no legacy editor references"
      - name: Worker registry must not register autoedit
        run: |
          if grep -n "autoedit" worker/src/jobs/index.ts | grep -v "removed"; then
            echo '::error::autoedit handler reappeared in the worker registry.'
            exit 1
          fi
          echo "clean: worker registry has no autoedit handler"
      - name: Single deployment path (no second Fly/PaaS manifest; no retired job-type override)
        run: |
          node scripts/ci/check_single_deploy_path.mjs --selftest
          node scripts/ci/check_single_deploy_path.mjs
      - name: VPS sign-off assertion logic (offline selftest — bad states must fail)
        run: bash worker/scripts/vps_signoff_assert.sh --selftest
      - name: VPS-diag authority (no caller SHA override; pinned strict host key)
        run: |
          node scripts/ci/check_vps_diag_authority.mjs --selftest
          node scripts/ci/check_vps_diag_authority.mjs
      - name: Canonical docs free of stale legacy claims (Fly/Revideo/autoedit/3-type registry)
        run: |
          node scripts/ci/check_docs_no_stale_claims.mjs --selftest
          node scripts/ci/check_docs_no_stale_claims.mjs
      - name: Probe-residue classifier (partial/complete cleanup cannot silently pass)
        run: node scripts/prod-smoke/probe_residue_report.mjs --selftest
      - name: Takes storage-policy inventory (no client DELETE-capable policy; migration-derived)
        run: |
          node scripts/ci/check_takes_delete_policy.mjs --selftest
          node scripts/ci/check_takes_delete_policy.mjs
      - name: Prod-smoke residue failure-injection harness (real flow + observation truth table)
        run: node scripts/prod-smoke/residue_harness.mjs --selftest
      - name: Product-truth (no shipped-editor claims while the production editor is disabled)
        run: |
          node scripts/ci/check_product_truth.mjs --selftest
          node scripts/ci/check_product_truth.mjs
      - name: Activation gate (fail-closed flag, no web caller, scaffold completion, no premature output constraint)
        run: |
          node scripts/ci/check_activation_gate.mjs --selftest
          node scripts/ci/check_activation_gate.mjs
      - name: Analysis-layer consistency (face* naming, strict versions, partial ON CONFLICT predicates)
        run: |
          node scripts/ci/check_analysis_consistency.mjs --selftest
          node scripts/ci/check_analysis_consistency.mjs

  # Offline hostile suite for the production gate-probe predicates
  # (scripts/ci/gate_probe_assert.mjs — the exact module verify-prod-gate.yml
  # calls for every pass/fail decision). Runs entirely offline: no network, no
  # secrets, no production contact.
  gate-probe-assert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Gate-probe predicates (hostile selftest)
        run: node scripts/ci/gate_probe_assert.mjs --selftest
