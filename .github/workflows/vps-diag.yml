name: VPS one-flow diagnostic
on: { workflow_dispatch: {} }
env: { VPS_HOST: 138.201.119.239 }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - env: { VPS_SSH_KEY: "${{ secrets.VPS_SSH_KEY }}" }
        run: |
          mkdir -p ~/.ssh; printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519; chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" "echo c2V0ICtlCmZvciBjIGluICQoZG9ja2VyIHBzIC0tZm9ybWF0ICd7ey5OYW1lc319Jyk7IGRvCiAgZWNobyAiPT0gJGMgPT0iCiAgZG9ja2VyIGV4ZWMgIiRjIiBzaCAtbGMgJ2VudiB8IGdyZXAgLWlFICJHRU1JTkl8QVBJRll8R09PR0xFfGFwaWZ5X2FwaSIgfCBzZWQgLUUgInMvPS4rLz1TRVQvIicgMj4vZGV2L251bGwKZG9uZQplY2hvICI9PSBkb25lID09Ig== | base64 -d | bash -s"
