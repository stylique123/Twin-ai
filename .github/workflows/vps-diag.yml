name: VPS one-flow diagnostic
on:
  workflow_dispatch: {}
env:
  VPS_HOST: 138.201.119.239
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH revideo health
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh; printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519; chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" 'bash -s' <<'REMOTE'
            set +e
            echo "== host RAM / CPU =="; free -m | head -2; echo "cores: $(nproc)"
            echo "== revideo state (restarts / OOM) =="
            docker inspect twinai-revideo --format 'restarts={{.RestartCount}} status={{.State.Status}} oom={{.State.OOMKilled}} mem_limit={{.HostConfig.Memory}} workers_env={{range .Config.Env}}{{println .}}{{end}}' | grep -E "restarts|REVIDEO_WORKERS|PORT" 
            echo "== revideo logs since edit (03:57-03:59) =="
            docker logs twinai-revideo --since 12m 2>&1 | tail -40
            echo "== done =="
          REMOTE
