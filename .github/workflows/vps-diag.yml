name: VPS diagnostic (read-only, fail-closed sign-off)
on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: 'Expected deployed worker SHA (default: current origin/main head)'
        required: false
        default: ''
env:
  VPS_HOST: 138.201.119.239
  # The canonical five-type registry (worker/src/env.ts). The single-deploy CI
  # guard already enforces env.ts == this set; here we assert the RUNNING worker
  # matches it too.
  EXP_REGISTRY: 'ingest,build_voice,scrape_dna,validate_source,editor_v2'
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Expected values are derived from the repo (not hand-typed): the deployed
      # worker tracks main, and the pinned model identity is the committed
      # manifest. This makes the assertions self-updating and drift-proof.
      - name: Resolve expected SHA + model identity
        run: |
          set -euo pipefail
          EXP_SHA="${{ inputs.expected_sha }}"
          [ -n "$EXP_SHA" ] || EXP_SHA=$(git ls-remote origin main | head -1 | cut -f1)
          [ -n "$EXP_SHA" ] || { echo "::error::could not resolve expected SHA"; exit 1; }
          EXP_REVISION=$(jq -r .revision worker/models/faster-whisper-small.manifest.json)
          EXP_BUNDLE=$(jq -r .analyzerBundle worker/models/faster-whisper-small.manifest.json)
          [ -n "$EXP_REVISION" ] && [ "$EXP_REVISION" != "null" ] || { echo "::error::no manifest revision"; exit 1; }
          [ -n "$EXP_BUNDLE" ] && [ "$EXP_BUNDLE" != "null" ] || { echo "::error::no manifest bundle"; exit 1; }
          {
            echo "EXP_SHA=$EXP_SHA"
            echo "EXP_REVISION=$EXP_REVISION"
            echo "EXP_BUNDLE=$EXP_BUNDLE"
          } >> "$GITHUB_ENV"
          echo "expected: sha=$EXP_SHA revision=$EXP_REVISION bundle=$EXP_BUNDLE registry=$EXP_REGISTRY"

      # READ-ONLY capture over SSH. Every command is a read (docker
      # ps/inspect/logs/exec-printenv, git rev-parse, --verify-only re-hash,
      # listener/env greps) â€” nothing is created, changed, or removed. Captures
      # are DEFENSIVE (|| true) so the block always emits a COMPLETE OBS_* fact
      # set; the fail-closed decision is made afterwards by
      # worker/scripts/vps_signoff_assert.sh, NOT by echo fallbacks here. Only
      # OBS_* lines go to stdout (â†’ facts.env); the human-readable snapshot goes
      # to stderr (visible in the Actions log).
      - name: Capture VPS facts
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh; printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519; chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" bash -s > facts.env <<'DIAG'
          set -uo pipefail
          C=twinai-worker
          emit() { printf '%s=%q\n' "$1" "${2:-}"; }

          echo "== raw containers ==" >&2
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' >&2 || true

          sha=$(git -C /opt/twinai-worker-src rev-parse HEAD 2>/dev/null || true)
          status=$(docker inspect "$C" --format '{{.State.Status}}' 2>/dev/null || true)
          health=$(docker inspect "$C" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' 2>/dev/null || true)
          restarts=$(docker inspect "$C" --format '{{.RestartCount}}' 2>/dev/null || true)

          upline=$(docker logs "$C" 2>&1 | grep '"msg":"worker up"' | tail -1 || true)
          registry=$(printf '%s' "$upline" | sed -n 's/.*"types":\[\([^]]*\)\].*/\1/p' | tr -d '"' | tr ',' '\n' | sed '/^[[:space:]]*$/d' | sort | paste -sd, - || true)
          override=$(docker exec "$C" printenv WORKER_JOB_TYPES 2>/dev/null || true)

          mident=$(docker exec "$C" python3 -c "import json;m=json.load(open('models/faster-whisper-small.manifest.json'));print(m['revision']+'|'+m['analyzerBundle'])" 2>/dev/null || true)
          revision=${mident%%|*}; bundle=${mident#*|}; [ "$mident" = "$revision" ] && bundle=""
          docker exec "$C" python3 scripts/fetch_model.py --verify-only --manifest models/faster-whisper-small.manifest.json --dest /opt/models/faster-whisper-small >/dev/null 2>&1 && vrc=0 || vrc=$?
          test_allow=$(docker exec "$C" printenv EDITOR_ALLOW_TEST_MODEL_MANIFEST 2>/dev/null || true)
          test_manifest=$(docker exec "$C" printenv EDITOR_SPEECH_MODEL_MANIFEST 2>/dev/null || true)

          rv1=$(docker ps -a --format '{{.Names}} {{.Image}}' | grep -ci revideo || true)
          rv2=$(docker images --format '{{.Repository}}' | grep -ci revideo || true)
          rv3=$(docker network ls --format '{{.Name}}' | grep -ci revideo || true)
          revideo=$((rv1 + rv2 + rv3))
          port4500=$({ ss -ltnH 2>/dev/null || netstat -ltn 2>/dev/null; } | grep -cE '[:.]4500([^0-9]|$)' || true)
          le1=$(docker exec "$C" printenv 2>/dev/null | grep -ciE '^(REVIDEO_|EDIT_|PEXELS_API_KEY|MUSIC_BED_URL)' || true)
          le2=$(grep -ciE '^(REVIDEO_|EDIT_|PEXELS_API_KEY|MUSIC_BED_URL)' /opt/twinai-worker.env 2>/dev/null || true)
          legacy_env=$((le1 + le2))

          {
            echo "OBS snapshot: sha=$sha status=$status health=$health restarts=$restarts"
            echo "  registry=[$registry] override=[$override] revision=$revision bundle=$bundle verify_rc=$vrc"
            echo "  test_allow=[$test_allow] test_manifest=[$test_manifest] revideo=$revideo port4500=$port4500 legacy_env=$legacy_env"
          } >&2

          emit OBS_SHA "$sha"
          emit OBS_STATUS "$status"
          emit OBS_HEALTH "$health"
          emit OBS_RESTARTS "$restarts"
          emit OBS_REGISTRY "$registry"
          emit OBS_JOBTYPES_OVERRIDE "$override"
          emit OBS_REVISION "$revision"
          emit OBS_BUNDLE "$bundle"
          emit OBS_VERIFY_RC "$vrc"
          emit OBS_TEST_ALLOW "$test_allow"
          emit OBS_TEST_MANIFEST "$test_manifest"
          emit OBS_REVIDEO "$revideo"
          emit OBS_PORT4500 "$port4500"
          emit OBS_LEGACY_ENV "$legacy_env"
          DIAG
          echo "---- captured facts.env ----"
          cat facts.env

      - name: Assert sign-off snapshot (fail-closed)
        run: |
          set -euo pipefail
          set -a; . ./facts.env; set +a
          bash worker/scripts/vps_signoff_assert.sh
