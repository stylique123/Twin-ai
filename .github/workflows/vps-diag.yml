name: VPS one-flow diagnostic
on:
  workflow_dispatch: {}
env:
  VPS_HOST: 138.201.119.239
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH log grab
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh; printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519; chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" 'bash -s' <<'REMOTE'
            set +e
            echo "== build_voice / transcript logs (last 12m) =="
            docker logs twinai-worker --since 12m 2>&1 | grep -iE "build_voice|transcript|Host not allowed|ffmpeg|whisper|c3aac84f" | tail -25
            echo "== worker has the fix? grep image src =="
            docker exec twinai-worker sh -lc "grep -c cdninstagram /app/dist/media.js || echo 'NOT-IN-IMAGE'"
            echo "== done =="
          REMOTE
