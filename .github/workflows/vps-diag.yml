name: VPS one-flow diagnostic
on: { workflow_dispatch: {} }
env: { VPS_HOST: 138.201.119.239 }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - env: { VPS_SSH_KEY: "${{ secrets.VPS_SSH_KEY }}" }
        run: |
          mkdir -p ~/.ssh; printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519; chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" "echo  | base64 -d > /tmp/abtest.js && docker cp /tmp/abtest.js twinai-worker:/tmp/abtest.js && docker exec twinai-worker node /tmp/abtest.js; rm -f /tmp/abtest.js"
