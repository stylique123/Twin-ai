name: VPS one-flow diagnostic
on:
  workflow_dispatch: {}
env:
  VPS_HOST: 138.201.119.239
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH worker log grab
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh; printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519; chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" 'bash -s' <<'REMOTE'
            set +e
            echo "== worker logs for job 1dd5b997 / premium =="
            docker logs twinai-worker 2>&1 | grep -E "1dd5b997|premium pass|revideo" | tail -30
            echo "== can revideo container reach the internet (supabase)? =="
            docker exec twinai-revideo node -e "fetch('https://jmdecibuytznsonrasxw.supabase.co/functions/v1/').then(r=>console.log('supabase reachable status',r.status)).catch(e=>console.log('NO INTERNET:',e.message))"
            echo "== done =="
          REMOTE
