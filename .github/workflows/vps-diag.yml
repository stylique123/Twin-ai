name: VPS diagnostic (read-only, fail-closed sign-off)
# NO workflow_dispatch inputs on purpose: the expected deployed SHA must derive
# ONLY from origin/main. A caller-supplied expected_sha could pin a stale
# deployed commit and make drift pass, which would defeat the whole fail-closed
# authority. (scripts/ci/check_vps_diag_authority.mjs enforces this in CI.)
on: { workflow_dispatch: {} }
env:
  VPS_HOST: 138.201.119.239
  # The canonical five-type registry (worker/src/env.ts). The single-deploy CI
  # guard already enforces env.ts == this set; here we assert the RUNNING worker
  # matches it too.
  EXP_REGISTRY: 'ingest,build_voice,scrape_dna,validate_source,editor_v2'
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Expected values are derived from the repo (never hand-typed or caller
      # supplied): deployed SHA == origin/main head (validated 40-hex, fail
      # closed); the pinned model identity is the committed manifest; the load
      # path is the committed Dockerfile ENV. Self-updating and drift-proof.
      - name: Resolve expected SHA + model identity (from origin/main + committed manifest)
        run: |
          set -euo pipefail
          M=worker/models/faster-whisper-small.manifest.json
          EXP_SHA=$(git ls-remote origin main | head -1 | cut -f1)
          printf '%s' "$EXP_SHA" | grep -Eq '^[0-9a-f]{40}$' \
            || { echo "::error::origin/main SHA is not 40 hex chars: '$EXP_SHA'"; exit 1; }
          EXP_REPOSITORY=$(jq -r .repository "$M")
          EXP_REVISION=$(jq -r .revision "$M")
          EXP_BUNDLE=$(jq -r .analyzerBundle "$M")
          EXP_MANIFEST_SHA=$(sha256sum "$M" | cut -d' ' -f1)
          EXP_MODEL_PATH=$(grep -oE 'EDITOR_SPEECH_MODEL_PATH=[^[:space:]]+' worker/Dockerfile | head -1 | cut -d= -f2)
          for v in EXP_REPOSITORY EXP_REVISION EXP_BUNDLE EXP_MODEL_PATH; do
            val="${!v}"; [ -n "$val" ] && [ "$val" != "null" ] || { echo "::error::$v empty"; exit 1; }
          done
          printf '%s' "$EXP_MANIFEST_SHA" | grep -Eq '^[0-9a-f]{64}$' || { echo "::error::EXP_MANIFEST_SHA not sha256"; exit 1; }
          {
            echo "EXP_SHA=$EXP_SHA"
            echo "EXP_REPOSITORY=$EXP_REPOSITORY"
            echo "EXP_REVISION=$EXP_REVISION"
            echo "EXP_BUNDLE=$EXP_BUNDLE"
            echo "EXP_MANIFEST_SHA=$EXP_MANIFEST_SHA"
            echo "EXP_MODEL_PATH=$EXP_MODEL_PATH"
          } >> "$GITHUB_ENV"
          echo "expected: sha=$EXP_SHA repo=$EXP_REPOSITORY revision=$EXP_REVISION bundle=$EXP_BUNDLE path=$EXP_MODEL_PATH manifestSha=${EXP_MANIFEST_SHA:0:12}…"

      # READ-ONLY capture over SSH with a PINNED host key (strict verification,
      # fail-closed). No ssh-keyscan / StrictHostKeyChecking=no — those trust
      # whatever host answers on first contact, so a MITM could spoof the VPS
      # facts. The host key comes from the protected VPS_KNOWN_HOSTS secret and
      # SSH must match it (StrictHostKeyChecking=yes). Neither key is printed.
      # Captures are DEFENSIVE (|| true) so the block always emits a COMPLETE
      # OBS_* set; the fail-closed DECISION is made afterwards by
      # worker/scripts/vps_signoff_assert.sh, never by an echo fallback here.
      - name: Capture VPS facts (pinned host key)
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_SSH_KEY:-}" ]; then echo "::error::VPS_SSH_KEY secret not set"; exit 1; fi
          if [ -z "${VPS_KNOWN_HOSTS:-}" ]; then
            echo "::error::VPS_KNOWN_HOSTS secret not set — refusing to SSH without a pinned host key (MITM risk). See DEPLOY.md → 'Pinning the VPS host key'."
            exit 1
          fi
          mkdir -p ~/.ssh; chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519; chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts_vps"; chmod 600 "$HOME/.ssh/known_hosts_vps"
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts_vps" \
            root@"$VPS_HOST" bash -s > facts.env <<'DIAG'
          set -uo pipefail
          C=twinai-worker
          emit() { printf '%s=%q\n' "$1" "${2:-}"; }

          echo "== raw containers ==" >&2
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}' >&2 || true

          sha=$(git -C /opt/twinai-worker-src rev-parse HEAD 2>/dev/null || true)
          status=$(docker inspect "$C" --format '{{.State.Status}}' 2>/dev/null || true)
          health=$(docker inspect "$C" --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' 2>/dev/null || true)
          restarts=$(docker inspect "$C" --format '{{.RestartCount}}' 2>/dev/null || true)

          upline=$(docker logs "$C" 2>&1 | grep '"msg":"worker up"' | tail -1 || true)
          registry=$(printf '%s' "$upline" | sed -n 's/.*"types":\[\([^]]*\)\].*/\1/p' | tr -d '"' | tr ',' '\n' | sed '/^[[:space:]]*$/d' | sort | paste -sd, - || true)
          override=$(docker exec "$C" printenv WORKER_JOB_TYPES 2>/dev/null || true)

          mident=$(docker exec "$C" python3 -c "import json;m=json.load(open('models/faster-whisper-small.manifest.json'));print(m['repository']+'|'+m['revision']+'|'+m['analyzerBundle'])" 2>/dev/null || true)
          repository=$(printf '%s' "$mident" | cut -d'|' -f1)
          revision=$(printf '%s' "$mident" | cut -d'|' -f2)
          bundle=$(printf '%s' "$mident" | cut -d'|' -f3)
          manifest_sha=$(docker exec "$C" python3 -c "import hashlib;print(hashlib.sha256(open('models/faster-whisper-small.manifest.json','rb').read()).hexdigest())" 2>/dev/null || true)
          model_path=$(docker exec "$C" printenv EDITOR_SPEECH_MODEL_PATH 2>/dev/null || true)
          docker exec "$C" python3 scripts/fetch_model.py --verify-only --manifest models/faster-whisper-small.manifest.json --dest "${model_path:-/opt/models/faster-whisper-small}" >/dev/null 2>&1 && vrc=0 || vrc=$?
          test_allow=$(docker exec "$C" printenv EDITOR_ALLOW_TEST_MODEL_MANIFEST 2>/dev/null || true)
          test_manifest=$(docker exec "$C" printenv EDITOR_SPEECH_MODEL_MANIFEST 2>/dev/null || true)

          rv1=$(docker ps -a --format '{{.Names}} {{.Image}}' | grep -ci revideo || true)
          rv2=$(docker images --format '{{.Repository}}' | grep -ci revideo || true)
          rv3=$(docker network ls --format '{{.Name}}' | grep -ci revideo || true)
          revideo=$((rv1 + rv2 + rv3))
          port4500=$({ ss -ltnH 2>/dev/null || netstat -ltn 2>/dev/null; } | grep -cE '[:.]4500([^0-9]|$)' || true)
          le1=$(docker exec "$C" printenv 2>/dev/null | grep -ciE '^(REVIDEO_|EDIT_|PEXELS_API_KEY|MUSIC_BED_URL)' || true)
          le2=$(grep -ciE '^(REVIDEO_|EDIT_|PEXELS_API_KEY|MUSIC_BED_URL)' /opt/twinai-worker.env 2>/dev/null || true)
          legacy_env=$((le1 + le2))

          {
            echo "OBS snapshot: sha=$sha status=$status health=$health restarts=$restarts"
            echo "  repo=$repository revision=$revision bundle=$bundle path=$model_path manifestSha=${manifest_sha:0:12} verify_rc=$vrc"
            echo "  registry=[$registry] override=[$override] test_allow=[$test_allow] test_manifest=[$test_manifest] revideo=$revideo port4500=$port4500 legacy_env=$legacy_env"
          } >&2

          emit OBS_SHA "$sha"
          emit OBS_STATUS "$status"
          emit OBS_HEALTH "$health"
          emit OBS_RESTARTS "$restarts"
          emit OBS_REGISTRY "$registry"
          emit OBS_JOBTYPES_OVERRIDE "$override"
          emit OBS_REPOSITORY "$repository"
          emit OBS_REVISION "$revision"
          emit OBS_BUNDLE "$bundle"
          emit OBS_MANIFEST_SHA "$manifest_sha"
          emit OBS_MODEL_PATH "$model_path"
          emit OBS_VERIFY_RC "$vrc"
          emit OBS_TEST_ALLOW "$test_allow"
          emit OBS_TEST_MANIFEST "$test_manifest"
          emit OBS_REVIDEO "$revideo"
          emit OBS_PORT4500 "$port4500"
          emit OBS_LEGACY_ENV "$legacy_env"
          DIAG
          echo "---- captured facts.env ----"
          cat facts.env

      - name: Assert sign-off snapshot (fail-closed)
        run: |
          set -euo pipefail
          set -a; . ./facts.env; set +a
          bash worker/scripts/vps_signoff_assert.sh
