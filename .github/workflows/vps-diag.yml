name: VPS one-flow diagnostic
on:
  workflow_dispatch: {}
env:
  VPS_HOST: 138.201.119.239
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH one-flow diagnostic
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then echo "::error::VPS_SSH_KEY not set"; exit 1; fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" 'bash -s' <<'REMOTE'
            set +e
            echo "== worker REVIDEO_URL =="
            docker exec twinai-worker node -e "console.log(process.env.REVIDEO_URL||'NOT-SET')"
            echo "== worker -> revideo /health =="
            docker exec twinai-worker node -e "fetch('http://172.17.0.1:4500/health').then(r=>r.text()).then(t=>console.log('REACHABLE',t)).catch(e=>console.log('UNREACHABLE',e.message))"
            RNAME=$(docker ps --filter name=revideo --format '{{.Names}}' | head -1)
            echo "== revideo container: $RNAME =="
            docker ps --filter name=revideo --format '{{.Names}} | {{.Status}} | {{.Ports}}'
            GW=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.Gateway}} {{end}}' "$RNAME" | awk '{print $1}')
            echo "revideo gateway: $GW"
            cd /tmp
            ffmpeg -y -f lavfi -i color=c=navy:s=1080x1920:d=2 -f lavfi -i sine=frequency=440:duration=2 -shortest -c:v libx264 -pix_fmt yuv420p -c:a aac base.mp4 >/dev/null 2>&1
            echo "base.mp4 = $(stat -c%s base.mp4) bytes"
            python3 -m http.server 8099 --bind 0.0.0.0 >/tmp/httpd.log 2>&1 &
            HP=$!; sleep 1
            echo "== can revideo fetch the base via gateway? =="
            docker exec "$RNAME" node -e "fetch('http://'+process.argv[1]+':8099/base.mp4').then(r=>console.log('base fetch status',r.status)).catch(e=>console.log('base fetch ERR',e.message))" "$GW"
            echo "== live premium render =="
            BODY="{\"baseClipUrl\":\"http://$GW:8099/base.mp4\",\"edl\":{\"captions\":{\"words\":[{\"text\":\"LIVE\",\"start\":0.1,\"end\":1.0},{\"text\":\"PASS\",\"start\":1.0,\"end\":1.9}],\"style\":\"bold-pop\"},\"highlightColor\":\"#23A6F5\"}}"
            T0=$(date +%s)
            code=$(curl -s -o /tmp/premium.mp4 -w '%{http_code}' --max-time 240 -X POST http://127.0.0.1:4500/render -H 'Content-Type: application/json' -d "$BODY")
            cx=$?
            kill $HP 2>/dev/null || true
            echo "render http=$code curl_exit=$cx elapsed=$(( $(date +%s)-T0 ))s size=$(stat -c%s /tmp/premium.mp4 2>/dev/null || echo 0)"
            file /tmp/premium.mp4
            echo "== revideo logs tail =="
            docker logs --tail 18 "$RNAME" 2>&1 | tail -18
            rm -f base.mp4 premium.mp4
            echo "== done =="
          REMOTE
