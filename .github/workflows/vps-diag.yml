name: VPS one-flow diagnostic
on: { workflow_dispatch: {} }
env: { VPS_HOST: 138.201.119.239 }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - env: { VPS_SSH_KEY: "${{ secrets.VPS_SSH_KEY }}" }
        run: |
          mkdir -p ~/.ssh; printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519; chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" "echo c2V0ICtlCmVjaG8gIldPUktFUl9KT0JfVFlQRVM9WyQoZG9ja2VyIGV4ZWMgdHdpbmFpLXdvcmtlciBwcmludGVudiBXT1JLRVJfSk9CX1RZUEVTKV0iCmVjaG8gImNvbXBvc2UgZW52IGZpbGUgcmVmczoiCmdyZXAgLXJsICJXT1JLRVJfSk9CX1RZUEVTIiAvcm9vdCAvb3B0IC9zcnYgMj4vZGV2L251bGwgfCBoZWFkCmVjaG8gIj09IGRvbmUgPT0i | base64 -d | bash -s"
