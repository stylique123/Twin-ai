name: VPS one-flow diagnostic
on:
  workflow_dispatch: {}
env:
  VPS_HOST: 138.201.119.239
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH one-flow diagnostic
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then echo "::error::VPS_SSH_KEY not set"; exit 1; fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" 'bash -s' <<'REMOTE'
            set +e
            echo "== worker REVIDEO_URL =="; docker exec twinai-worker node -e "console.log(process.env.REVIDEO_URL||'NOT-SET')"
            RNAME=$(docker ps --filter name=revideo --format '{{.Names}}' | head -1)
            GW=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.Gateway}} {{end}}' "$RNAME" | awk '{print $1}')
            echo "revideo=$RNAME gateway=$GW"
            docker exec twinai-worker bash -lc 'ffmpeg -y -f lavfi -i color=c=navy:s=1080x1920:d=2 -f lavfi -i sine=frequency=440:duration=2 -shortest -c:v libx264 -pix_fmt yuv420p -c:a aac /tmp/base.mp4 >/dev/null 2>&1; echo worker-ffmpeg-exit=$?'
            docker cp twinai-worker:/tmp/base.mp4 /tmp/base.mp4
            echo "host base.mp4 = $(stat -c%s /tmp/base.mp4 2>/dev/null || echo MISSING) bytes"
            echo "" | base64 -d > /tmp/srv.py
            pkill -f srv.py 2>/dev/null; pkill -f http.server 2>/dev/null; fuser -k 8099/tcp 2>/dev/null; sleep 3
            python3 /tmp/srv.py >/tmp/srv.log 2>&1 & HP=$!; sleep 2; echo "srv start:"; head -3 /tmp/srv.log 2>/dev/null
            docker exec "$RNAME" node -e "fetch('http://'+process.argv[1]+':8099/base.mp4').then(r=>console.log('revideo fetch',r.status,'accept-ranges='+r.headers.get('accept-ranges'),'cors='+r.headers.get('access-control-allow-origin'))).catch(e=>console.log('ERR',e.message))" "$GW"
            echo "== live premium render =="
            BODY="{\"baseClipUrl\":\"http://$GW:8099/base.mp4\",\"edl\":{\"captions\":{\"words\":[{\"text\":\"LIVE\",\"start\":0.1,\"end\":1.0},{\"text\":\"PASS\",\"start\":1.0,\"end\":1.9}],\"style\":\"bold-pop\"},\"highlightColor\":\"#23A6F5\"}}"
            T0=$(date +%s)
            code=$(curl -s -o /tmp/premium.mp4 -w '%{http_code}' --max-time 180 -X POST http://127.0.0.1:4500/render -H 'Content-Type: application/json' -d "$BODY"); cx=$?
            kill $HP 2>/dev/null; pkill -f /tmp/srv.py 2>/dev/null
            SZ=$(stat -c%s /tmp/premium.mp4 2>/dev/null || echo 0)
            echo "render http=$code curl_exit=$cx elapsed=$(( $(date +%s)-T0 ))s size=$SZ"
            python3 -c "import os;b=open('/tmp/premium.mp4','rb').read(16) if os.path.exists('/tmp/premium.mp4') else b'';print('magic',b[:12]);print('VALID_MP4',len(b)>=8 and b[4:8]==b'ftyp')"
            echo "== revideo logs tail =="; docker logs --tail 5 "$RNAME" 2>&1 | tail -5
            rm -f /tmp/base.mp4 /tmp/premium.mp4 /tmp/srv.py; docker exec twinai-worker rm -f /tmp/base.mp4 2>/dev/null
            echo "== done =="
          REMOTE
