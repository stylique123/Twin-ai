name: VPS one-flow diagnostic
# Dispatch-only. Verifies the Revideo "one flow" wiring on the live VPS:
#   1) REVIDEO_URL is in the worker env file and in the running container
#   2) the worker container can reach the Revideo service (172.17.0.1:4500)
#   3) a real premium caption render succeeds end-to-end on the box
on:
  workflow_dispatch: {}

env:
  VPS_HOST: 138.201.119.239

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: SSH one-flow diagnostic
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then echo "::error::VPS_SSH_KEY not set"; exit 1; fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" 'bash -se' <<'REMOTE'
            set -uo pipefail
            echo "== 1. REVIDEO_URL in /opt/twinai-worker.env =="
            grep -E '^REVIDEO_URL=' /opt/twinai-worker.env || echo "MISSING"
            echo "== 1b. REVIDEO_URL inside running worker container =="
            docker exec twinai-worker node -e "console.log(process.env.REVIDEO_URL||'NOT-SET')"
            echo "== 2. worker container -> revideo /health =="
            docker exec twinai-worker node -e "fetch('http://172.17.0.1:4500/health').then(r=>r.text()).then(t=>console.log('REACHABLE',t)).catch(e=>console.log('UNREACHABLE',e.message))"
            echo "== 3. live premium render (base -> revideo -> mp4) =="
            cd /tmp
            ffmpeg -y -f lavfi -i color=c=navy:s=1080x1920:d=2 -f lavfi -i sine=frequency=440:duration=2 -shortest -c:v libx264 -pix_fmt yuv420p -c:a aac base.mp4 >/dev/null 2>&1 \
              && echo "base.mp4 = $(stat -c%s base.mp4) bytes"
            python3 -m http.server 8099 --bind 0.0.0.0 >/tmp/httpd.log 2>&1 &
            HP=$!; sleep 1
            BODY='{"baseClipUrl":"http://172.17.0.1:8099/base.mp4","edl":{"captions":{"words":[{"text":"PREMIUM","start":0.1,"end":0.7},{"text":"PASS","start":0.7,"end":1.3},{"text":"LIVE","start":1.3,"end":1.9}],"style":"bold-pop"},"highlightColor":"#23A6F5"}}'
            code=$(curl -s -o /tmp/premium.mp4 -w '%{http_code}' --max-time 150 -X POST http://127.0.0.1:4500/render -H 'Content-Type: application/json' -d "$BODY")
            kill $HP 2>/dev/null || true
            echo "render http=$code size=$(stat -c%s /tmp/premium.mp4 2>/dev/null || echo 0) bytes"
            file /tmp/premium.mp4 || true
            rm -f base.mp4 premium.mp4
            echo "== done =="
          REMOTE
