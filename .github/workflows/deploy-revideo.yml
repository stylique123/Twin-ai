name: Deploy revideo
# Builds + runs the TwinAI Revideo render sidecar on the VPS (GitHub = source of truth).
# REVIDEO_WORKERS=2: 4 parallel Chromium workers OOM-restart the container mid-render
# on the 8GB box (~4.7GB free), which dropped the worker's connection and made the
# premium pass silently fall back to ffmpeg. 2 workers fit in RAM and render reliably.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['revideo/**', '.github/workflows/deploy-revideo.yml']
concurrency:
  group: deploy-revideo
  cancel-in-progress: false
env:
  VPS_HOST: 138.201.119.239
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy revideo over SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then echo "::error::VPS_SSH_KEY not set"; exit 1; fi
          mkdir -p ~/.ssh; printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519; chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@"$VPS_HOST" 'bash -se' <<'REMOTE'
            set -euo pipefail
            cd /opt/twinai-worker-src
            git fetch origin main
            git reset --hard FETCH_HEAD
            # 2GB swap cushion so a render spike can never hard-kill the box.
            if [ ! -f /swapfile ]; then
              fallocate -l 2G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile || true
            fi
            docker build -t twinai-revideo revideo/
            docker rm -f twinai-revideo 2>/dev/null || true
            # B1: bind the render port to LOOPBACK only — the worker on the same host
            # reaches it at 127.0.0.1:4500, but it is never exposed on the public
            # interface (was -p 4500:4500 = 0.0.0.0). Pass through the auth token +
            # host allow-list so the service enforces them (defence in depth).
            docker run -d --name twinai-revideo --restart unless-stopped               -p 127.0.0.1:4500:4500 -e PORT=4500 -e REVIDEO_WORKERS=2               -e RENDER_TOKEN="${RENDER_TOKEN:-}" -e RENDER_ALLOWED_HOSTS="${RENDER_ALLOWED_HOSTS:-}" twinai-revideo
            sleep 4
            echo "deployed: $(git rev-parse --short HEAD)"
            echo "health: $(curl -s --max-time 5 http://127.0.0.1:4500/health || echo UNREACHABLE)"
            docker ps --filter name=twinai-revideo --format 'STATUS: {{.Status}} | {{.Ports}}'
          REMOTE
