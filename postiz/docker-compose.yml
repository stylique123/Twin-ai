# TwinAI publishing — self-hosted Postiz (open-source) + auto-HTTPS via Caddy.
# Postiz handles the OAuth + posting + analytics for TikTok / Instagram / YouTube /
# X / LinkedIn etc.; TwinAI calls its public API to publish blueprints and read
# back real metrics. Runs alongside the worker on the same box.
#
# Requires a domain A-record pointing at this server (for OAuth callbacks + HTTPS).
# Configure values in /opt/twinai-postiz.env (see deploy-postiz.sh header).

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      POSTIZ_DOMAIN: ${POSTIZ_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - postiz

  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: unless-stopped
    environment:
      MAIN_URL: "https://${POSTIZ_DOMAIN}"
      FRONTEND_URL: "https://${POSTIZ_DOMAIN}"
      NEXT_PUBLIC_BACKEND_URL: "https://${POSTIZ_DOMAIN}/api"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      JWT_SECRET: "${POSTIZ_JWT_SECRET}"
      DATABASE_URL: "postgresql://postiz:${POSTIZ_DB_PASSWORD}@postiz-postgres:5432/postiz"
      REDIS_URL: "redis://postiz-redis:6379"
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "${POSTIZ_DISABLE_REGISTRATION:-false}"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_UPLOAD_DIRECTORY: "/uploads"
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: ${POSTIZ_DB_PASSWORD}
      POSTGRES_DB: postiz
    volumes:
      - postiz-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz -d postiz"]
      interval: 10s
      timeout: 3s
      retries: 5

  postiz-redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    volumes:
      - postiz-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postiz-config:
  postiz-uploads:
  postiz-pg:
  postiz-redis:
  caddy-data:
  caddy-config:
